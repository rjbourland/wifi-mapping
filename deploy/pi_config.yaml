# Pi-specific configuration overlay
# Merge with configs/anchors.yaml and configs/algorithm.yaml

# Nexmon CSI interface settings
nexmon:
  interface: "mon0"
  channel: 36
  bandwidth: 80

# Collection parameters optimized for Pi hardware
collection:
  sample_rate: 50
  duration: 60
  packets_per_sample: 10
  output_format: "parquet"
  output_dir: "/opt/wifi-mapping/data"

  esp32:
    serial_port: "/dev/ttyUSB0"
    baud_rate: 921600
    channel: 6
    bandwidth: 20

  ax210:
    interface: "wlan0"
    channel: 36
    bandwidth: 80
    output_format: "pcap"

# Pi-specific anchors (update for your room)
anchors:
  anchor_1:
    position: [0.0, 0.0, 2.5]
    height: "ceiling"
    hardware: "esp32_s3"
    ip: "192.168.1.101"
    channel: 6
    bandwidth: 20

  anchor_2:
    position: [4.0, 0.0, 1.3]
    height: "mid"
    hardware: "esp32_s3"
    ip: "192.168.1.102"
    channel: 6
    bandwidth: 20

  anchor_3:
    position: [4.0, 4.0, 0.3]
    height: "floor"
    hardware: "esp32_s3"
    ip: "192.168.1.103"
    channel: 6
    bandwidth: 20

  anchor_4:
    position: [0.0, 4.0, 2.5]
    height: "ceiling"
    hardware: "esp32_s3"
    ip: "192.168.1.104"
    channel: 6
    bandwidth: 20

room:
  length_x: 4.0
  width_y: 4.0
  height_z: 2.5